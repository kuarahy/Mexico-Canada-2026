<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>⚽ FIFA World Cup 2026 Dashboard</title>
  <style>
    :root {
      --primary: #0D1F50;
      --accent:  #E8404A;
      --bg:      #0c0f1a;
      --surface: #131826;
      --surface2:#1a2132;
      --text:    #e8edf2;
      --muted:   #8a9bb0;
      --win:     #3D8AE8;
      --draw:    #E07820;
      --loss:    #E8404A;
      --border:  #263048;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

    header {
      background: linear-gradient(135deg, #5C1220 0%, #0c0f1a 100%);
      padding: 16px 24px;
      border-bottom: 2px solid var(--accent);
      display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 12px;
    }
    .logo { display: flex; align-items: center; gap: 10px; }
    .logo h1 { font-size: 1.4rem; color: var(--accent); font-weight: 800; }
    .logo small { color: var(--muted); font-size: 0.8rem; display: block; }
    nav { display: flex; gap: 4px; background: rgba(0,0,0,.35); padding: 4px; border-radius: 8px; }
    nav button {
      background: transparent; border: none; color: var(--muted);
      padding: 7px 15px; border-radius: 6px; cursor: pointer; font-size: .88rem; transition: .15s;
    }
    nav button.active { background: var(--accent); color: #fff; font-weight: 700; }
    nav button:hover:not(.active) { background: rgba(255,255,255,.1); color: var(--text); }

    .container { max-width: 1450px; margin: 0 auto; padding: 20px 24px; }
    .tab { display: none; }
    .tab.active { display: block; }
    .hint { font-size: .78rem; color: var(--muted); text-align: center; margin-bottom: 14px; }

    .stat-bar { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 20px; align-items: center; }
    .stat { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 10px 18px; text-align: center; }
    .stat .val { font-size: 1.7rem; font-weight: 700; color: var(--accent); }
    .stat .lbl { font-size: .72rem; color: var(--muted); }
    .progress-wrap { flex: 1; min-width: 160px; }
    .progress-bar { height: 4px; background: var(--border); border-radius: 2px; overflow: hidden; }
    .progress-fill { height: 100%; background: var(--accent); border-radius: 2px; transition: width .4s; }
    .progress-label { font-size: .72rem; color: var(--muted); text-align: right; margin-top: 3px; }

    .groups-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(520px, 1fr)); gap: 18px; }
    .group-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; }
    .group-hd {
      background: linear-gradient(135deg, #0D1F50, #1A3580);
      padding: 10px 14px; display: flex; justify-content: space-between; align-items: center;
    }
    .group-hd h2 { color: var(--accent); font-size: 1rem; font-weight: 800; }
    .group-hd span { color: rgba(255,255,255,.55); font-size: .74rem; }
    .group-body { display: grid; grid-template-columns: 55% 45%; }
    .matches-col { padding: 10px; border-right: 1px solid var(--border); }
    .matches-col h3 { font-size: .7rem; text-transform: uppercase; letter-spacing: .4px; color: var(--muted); margin-bottom: 6px; }
    .match-row {
      background: var(--surface2); border-radius: 7px; padding: 7px 9px; margin-bottom: 5px;
      cursor: pointer; border: 1px solid transparent; transition: border-color .15s;
    }
    .match-row:hover { border-color: var(--accent); }
    .match-row.completed { border-color: var(--border); }
    .match-row.live { border-color: var(--win); animation: pulse .9s infinite alternate; }
    @keyframes pulse { from { border-color: var(--win); } to { border-color: transparent; } }
    .row-teams { display: grid; grid-template-columns: 22px 1fr auto 1fr 22px; align-items: center; gap: 5px; }
    .t1 { text-align: right; font-size: .82rem; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .t2 { text-align: left;  font-size: .82rem; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .fl { width: 22px; height: 15px; object-fit: cover; border-radius: 2px; flex-shrink: 0; display: inline-block; vertical-align: middle; }
    .score-mid { display: flex; align-items: center; gap: 4px; font-weight: 700; white-space: nowrap; }
    .score-mid .s { color: var(--accent); min-width: 18px; text-align: center; font-size: .95rem; }
    .score-mid .vs { color: var(--muted); font-size: .7rem; font-weight: 400; }
    .row-meta { font-size: .65rem; color: var(--muted); text-align: center; margin-top: 4px; line-height: 1.6; }
    .tz-line { display: block; color: rgba(138,155,176,.75); font-size: .63rem; }
    .standings-col { padding: 10px; }
    .standings-col h3 { font-size: .7rem; text-transform: uppercase; letter-spacing: .4px; color: var(--muted); margin-bottom: 6px; }
    .std-table { width: 100%; border-collapse: collapse; font-size: .76rem; }
    .std-table th { color: var(--muted); font-weight: 600; text-align: center; padding: 3px; }
    .std-table th:first-child { text-align: left; }
    .std-table td { padding: 4px 3px; text-align: center; border-top: 1px solid var(--border); }
    .std-table td:first-child { text-align: left; }
    .std-table tr.q1, .std-table tr.q2 { background: rgba(61,138,232,.08); }
    .std-table tr.q3 { background: rgba(224,120,32,.08); }
    .pos { display: inline-flex; align-items: center; justify-content: center;
           width: 17px; height: 17px; border-radius: 50%; font-size: .68rem; font-weight: 700; margin-right: 3px; }
    .p1,.p2 { background: var(--win); color: #fff; }
    .p3 { background: var(--draw); color: #fff; }
    .p4 { border: 1px solid var(--border); }
    .std-legend { font-size: .67rem; color: var(--muted); margin-top: 6px; display: flex; gap: 8px; flex-wrap: wrap; }
    .dot { display: inline-block; width: 9px; height: 9px; border-radius: 50%; margin-right: 3px; }

    .bracket-scroll { overflow-x: auto; padding-bottom: 16px; }
    .bracket { display: flex; gap: 20px; min-width: max-content; padding: 10px 0; }
    .rnd-col { display: flex; flex-direction: column; gap: 6px; min-width: 190px; }
    .rnd-title {
      text-align: center; font-size: .75rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: .8px; color: var(--accent); padding: 7px;
      background: var(--surface); border: 1px solid var(--border); border-radius: 6px; margin-bottom: 4px;
    }
    .b-match { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; overflow: hidden; cursor: pointer; transition: border-color .15s; }
    .b-match:hover { border-color: var(--accent); }
    .b-team { padding: 7px 10px; font-size: .8rem; display: flex; justify-content: space-between; align-items: center; gap: 6px; }
    .b-team:first-of-type { border-bottom: 1px solid var(--border); }
    .b-team.winner { background: rgba(46,204,113,.1); font-weight: 700; }
    .b-name { display: flex; align-items: center; gap: 5px; flex: 1; min-width: 0; }
    .b-name .tn { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .b-score { font-weight: 700; color: var(--accent); min-width: 18px; text-align: right; font-size: .9rem; flex-shrink: 0; }
    .b-meta { font-size: .67rem; color: var(--muted); padding: 4px 8px; background: var(--surface2); border-top: 1px solid var(--border); text-align: center; line-height: 1.7; }

    .filters { display: flex; gap: 7px; margin-bottom: 18px; flex-wrap: wrap; }
    .fbtn {
      padding: 5px 13px; border-radius: 20px; border: 1px solid var(--border);
      background: transparent; color: var(--muted); cursor: pointer; font-size: .8rem; transition: .15s;
    }
    .fbtn.active, .fbtn:hover { background: var(--accent); color: #fff; border-color: var(--accent); font-weight: 600; }
    .sched-day { margin-bottom: 22px; }
    .sched-day h3 { font-size: .82rem; color: var(--muted); font-weight: 600; padding-bottom: 5px; border-bottom: 1px solid var(--border); margin-bottom: 8px; }
    .sched-row {
      background: var(--surface); border: 1px solid var(--border); border-radius: 8px;
      padding: 10px 14px; margin-bottom: 7px; cursor: pointer;
      display: grid; grid-template-columns: 90px 22px 1fr auto 1fr 22px 110px; align-items: center; gap: 8px; transition: border-color .15s;
    }
    .sched-row:hover { border-color: var(--accent); }
    .sched-time { font-size: .75rem; font-weight: 700; color: var(--accent); text-align: center; line-height: 1.75; }
    .sched-time .tz { display: block; font-size: .67rem; font-weight: 400; color: var(--muted); }
    .sched-score { text-align: center; font-size: .9rem; font-weight: 700; white-space: nowrap; }
    .sched-t { font-size: .82rem; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .sched-t.right { text-align: right; }
    .stage-pill { font-size: .69rem; padding: 3px 8px; border-radius: 12px; background: var(--surface2); color: var(--muted); text-align: center; white-space: nowrap; }

    .overlay { position: fixed; inset: 0; background: rgba(0,0,0,.7); display: flex; align-items: center; justify-content: center; z-index: 900; padding: 20px; }
    .overlay.hidden { display: none; }
    .modal { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 22px; max-width: 430px; width: 100%; }
    .modal h2 { font-size: 1rem; color: var(--accent); margin-bottom: 16px; }
    .modal-teams { display: grid; grid-template-columns: 1fr 28px 1fr; align-items: center; gap: 8px; margin-bottom: 12px; text-align: center; font-size: .88rem; font-weight: 600; }
    .modal-teams .sep { color: var(--muted); font-size: .85rem; }
    .score-inputs { display: grid; grid-template-columns: 1fr 28px 1fr; align-items: center; gap: 8px; margin-bottom: 14px; }
    .score-inputs .dash { color: var(--muted); text-align: center; font-size: 1.2rem; }
    .score-inputs input {
      text-align: center; font-size: 1.5rem; font-weight: 700;
      background: var(--surface2); border: 2px solid var(--border); color: var(--text);
      border-radius: 8px; padding: 8px; width: 100%;
    }
    .score-inputs input:focus { outline: none; border-color: var(--accent); }
    .pen-row { display: none; margin-bottom: 14px; }
    .pen-row.show { display: block; }
    .pen-row label { font-size: .78rem; color: var(--muted); display: block; margin-bottom: 6px; }
    .pen-row .pen-grid { display: grid; grid-template-columns: 1fr 28px 1fr; align-items: center; gap: 8px; }
    .pen-row input { text-align: center; font-size: 1.1rem; font-weight: 700; background: var(--surface2); border: 1px solid var(--border); color: var(--text); border-radius: 6px; padding: 7px; width: 100%; }
    .pen-row input:focus { outline: none; border-color: var(--accent); }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 12px; }
    .form-group { margin-bottom: 12px; }
    .form-group label { font-size: .78rem; color: var(--muted); display: block; margin-bottom: 4px; }
    .form-group input, .form-group select {
      width: 100%; background: var(--surface2); border: 1px solid var(--border);
      color: var(--text); border-radius: 7px; padding: 7px 10px; font-size: .88rem;
    }
    .form-group input:focus, .form-group select:focus { outline: none; border-color: var(--accent); }
    .modal-footer { display: flex; justify-content: space-between; align-items: center; margin-top: 6px; }
    .btn { padding: 9px 18px; border-radius: 7px; border: none; cursor: pointer; font-size: .88rem; font-weight: 600; transition: .15s; }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-primary:hover { background: #e6b800; }
    .btn-ghost { background: transparent; color: var(--muted); border: 1px solid var(--border); }
    .btn-ghost:hover { background: var(--surface2); color: var(--text); }
    .btn-danger { background: transparent; color: var(--loss); border: 1px solid var(--loss); }
    .btn-danger:hover { background: rgba(231,76,60,.1); }
    .reset-fab {
      position: fixed; bottom: 18px; right: 18px; z-index: 200;
      background: var(--surface); border: 1px solid var(--border); color: var(--muted);
      padding: 7px 13px; border-radius: 8px; cursor: pointer; font-size: .75rem; transition: .15s;
    }
    .reset-fab:hover { border-color: var(--loss); color: var(--loss); }

    @media (max-width: 600px) {
      .groups-grid { grid-template-columns: 1fr; }
      .group-body { grid-template-columns: 1fr; }
      .matches-col { border-right: none; border-bottom: 1px solid var(--border); }
      .sched-row { grid-template-columns: 54px 1fr auto 1fr; }
      .sched-row .stage-pill { display: none; }
      .bracket { gap: 12px; }
      .rnd-col { min-width: 150px; }
    }
  </style>
</head>
<body>

<header>
  <div class="logo">
    <span style="font-size:2rem">⚽</span>
    <div>
      <h1>FIFA World Cup 2026</h1>
      <small>Jun 11 – Jul 19 · USA · Canada · Mexico · 48 teams · 104 matches</small>
    </div>
  </div>
  <nav>
    <button class="active" onclick="showTab('groups')">Group Stage</button>
    <button onclick="showTab('knockout')">Knockout</button>
    <button onclick="showTab('schedule')">Schedule</button>
  </nav>
</header>

<div class="container">
  <div id="stat-bar" class="stat-bar"></div>

  <div id="tab-groups" class="tab active">
    <p class="hint">✏️ Click any match card to enter or update the result · All data auto-saved locally</p>
    <div class="groups-grid" id="groups-grid"></div>
  </div>

  <div id="tab-knockout" class="tab">
    <p class="hint">✏️ Click any match to enter result · Update team names as bracket fills in</p>
    <div class="bracket-scroll">
      <div class="bracket" id="bracket"></div>
    </div>
  </div>

  <div id="tab-schedule" class="tab">
    <div class="filters">
      <button class="fbtn active" onclick="filterSched('all',this)">All (104)</button>
      <button class="fbtn" onclick="filterSched('group',this)">Group Stage</button>
      <button class="fbtn" onclick="filterSched('knockout',this)">Knockout</button>
      <button class="fbtn" onclick="filterSched('upcoming',this)">Upcoming</button>
      <button class="fbtn" onclick="filterSched('completed',this)">Completed</button>
    </div>
    <div id="sched-list"></div>
  </div>
</div>

<div class="overlay hidden" id="overlay">
  <div class="modal">
    <h2 id="m-title">Edit Match</h2>
    <div class="modal-teams">
      <span id="m-t1"></span>
      <span class="sep">vs</span>
      <span id="m-t2"></span>
    </div>
    <div class="score-inputs">
      <input type="number" id="m-s1" min="0" placeholder="0" />
      <div class="dash">–</div>
      <input type="number" id="m-s2" min="0" placeholder="0" />
    </div>
    <div class="pen-row" id="pen-row">
      <label>Penalty Shootout (if applicable)</label>
      <div class="pen-grid">
        <input type="number" id="m-p1" min="0" placeholder="–" />
        <div style="text-align:center;color:var(--muted)">–</div>
        <input type="number" id="m-p2" min="0" placeholder="–" />
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Date</label>
        <input type="date" id="m-date" />
      </div>
      <div class="form-group">
        <label>Time (local)</label>
        <input type="time" id="m-time" />
      </div>
    </div>
    <div class="form-group">
      <label>Venue / City</label>
      <input type="text" id="m-venue" placeholder="e.g. MetLife Stadium, New Jersey" />
    </div>
    <div class="form-group">
      <label>Status</label>
      <select id="m-status">
        <option value="scheduled">Scheduled</option>
        <option value="live">Live 🟢</option>
        <option value="completed">Completed</option>
      </select>
    </div>
    <div class="modal-footer">
      <button class="btn btn-danger" onclick="clearResult()">Clear Result</button>
      <div style="display:flex;gap:8px">
        <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
        <button class="btn btn-primary" onclick="saveResult()">Save</button>
      </div>
    </div>
  </div>
</div>

<button class="reset-fab" onclick="resetAll()">🔄 Reset All Data</button>

<script>
let currentTab = 'groups';
let schedFilter = 'all';

function showTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-' + tab).classList.add('active');
  const idx = ['groups','knockout','schedule'].indexOf(tab);
  document.querySelectorAll('nav button')[idx].classList.add('active');
}

function filterSched(f, btn) {
  schedFilter = f;
  document.querySelectorAll('.fbtn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
}

function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function fmtDate(d) { if(!d) return ''; return new Date(d+'T12:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric'}); }
function fmtDateLong(d) { if(!d) return 'TBD'; return new Date(d+'T12:00:00').toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric',year:'numeric'}); }

// UTC offsets for each venue city during June/July 2026
const VENUE_UTC = {
  'Mexico City':-6,'Guadalajara':-6,'Monterrey':-6,
  'Atlanta':-4,'Boston':-4,'Miami':-4,'Philadelphia':-4,'Toronto':-4,
  'New York/New Jersey':-4,
  'Dallas':-5,'Houston':-5,'Kansas City':-5,
  'Los Angeles':-7,'San Francisco Bay Area':-7,'Seattle':-7,'Vancouver':-7,
};

function flag(name) {
  const code = FLAGS[name];
  return code ? `<img src="https://flagcdn.com/w20/${code}.png" class="fl" alt="${name}" title="${name}">` : '';
}

function _addMin(hhmm, mins) {
  const [h, m] = hhmm.split(':').map(Number);
  const t = ((h * 60 + m + mins) % 1440 + 1440) % 1440;
  return String(Math.floor(t/60)).padStart(2,'0') + ':' + String(t%60).padStart(2,'0');
}
function _venueOffset(venue) {
  if (!venue) return null;
  for (const [k, v] of Object.entries(VENUE_UTC)) { if (venue.includes(k)) return v; }
  return null;
}
function toGMT(time, venue) {
  if (!time) return '–'; const off = _venueOffset(venue);
  return off == null ? '–' : _addMin(time, -off * 60);
}
function toCDT(time, venue) {
  const gmt = toGMT(time, venue);
  return gmt === '–' ? '–' : _addMin(gmt, -5 * 60);
}

// ── STANDINGS ───────────────────────────────────────────────

function standings(gid) {
  const grp = GROUPS_DEF.find(g=>g.id===gid);
  const rows = {};
  grp.teams.forEach(t => rows[t]={team:t,mp:0,w:0,d:0,l:0,gf:0,ga:0,gd:0,pts:0});
  Object.values(matches).forEach(m=>{
    if(m.type!=='group'||m.group!==gid||m.status!=='completed'||m.score1===null||m.score2===null) return;
    const s1=+m.score1, s2=+m.score2;
    if(isNaN(s1)||isNaN(s2)) return;
    const r1=rows[m.team1], r2=rows[m.team2];
    r1.mp++; r2.mp++;
    r1.gf+=s1; r1.ga+=s2; r2.gf+=s2; r2.ga+=s1;
    r1.gd=r1.gf-r1.ga; r2.gd=r2.gf-r2.ga;
    if(s1>s2){r1.w++;r1.pts+=3;r2.l++;}
    else if(s2>s1){r2.w++;r2.pts+=3;r1.l++;}
    else{r1.d++;r1.pts++;r2.d++;r2.pts++;}
  });
  return Object.values(rows).sort((a,b)=>b.pts-a.pts||b.gd-a.gd||b.gf-a.gf||a.team.localeCompare(b.team));
}

function renderStats() {
  const all = Object.values(matches);
  const done = all.filter(m=>m.status==='completed').length;
  const goals = all.filter(m=>m.score1!==null&&m.score2!==null).reduce((s,m)=>s+(+m.score1)+(+m.score2),0);
  const pct = ((done/all.length)*100).toFixed(0);
  document.getElementById('stat-bar').innerHTML=`
    <div class="stat"><div class="val">${done}</div><div class="lbl">Played</div></div>
    <div class="stat"><div class="val">${all.length-done}</div><div class="lbl">Remaining</div></div>
    <div class="stat"><div class="val">${goals}</div><div class="lbl">Goals</div></div>
    <div class="stat"><div class="val">${done?((goals/done).toFixed(1)):'–'}</div><div class="lbl">Goals/Match</div></div>
    <div class="progress-wrap">
      <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
      <div class="progress-label">${pct}% complete</div>
    </div>`;
}

function renderGroupCard(g) {
  const ms = Object.values(matches).filter(m=>m.type==='group'&&m.group===g.id)
                   .sort((a,b)=>a.matchday-b.matchday||(a.id>b.id?1:-1));
  const std = standings(g.id);
  const done = ms.filter(m=>m.status==='completed').length;

  const matchRows = ms.map(m=>{
    const has = m.score1!==null&&m.score2!==null;
    const mid = has
      ? `<span class="s">${m.score1}</span><span style="color:var(--muted);font-size:.75rem">–</span><span class="s">${m.score2}</span>`
      : `<span class="vs">MD${m.matchday}</span>`;
    const pen = (m.pen1!==null&&m.pen2!==null)? ` <span style="font-size:.65rem;color:var(--muted)">(${m.pen1}–${m.pen2}p)</span>` : '';
    const cls = m.status==='completed'?'completed':m.status==='live'?'live':'';
    const gmt = toGMT(m.time, m.venue), cdt = toCDT(m.time, m.venue);
    const tzLine = (gmt!=='–') ? `<span class="tz-line">${gmt} GMT · ${cdt} CDT</span>` : '';
    return `<div class="match-row ${cls}" onclick="openModal('${m.id}')">
        <div class="row-teams">
          ${flag(m.team1)}
          <div class="t1">${esc(m.team1)}</div>
          <div class="score-mid">${mid}${pen}</div>
          <div class="t2">${esc(m.team2)}</div>
          ${flag(m.team2)}
        </div>
        <div class="row-meta">${fmtDate(m.date)}${m.venue?' · '+esc(m.venue):''}${tzLine}</div>
      </div>`;
  }).join('');

  const stdRows = std.map((r,i)=>{
    const cls = i<2?`q${i+1}`:i===2?'q3':'';
    return `<tr class="${cls}">
      <td><span class="pos p${i+1}">${i+1}</span>${flag(r.team)} ${esc(r.team)}</td>
      <td>${r.mp}</td><td><b>${r.pts}</b></td>
      <td>${r.w}</td><td>${r.d}</td><td>${r.l}</td>
      <td>${r.gd>0?'+':''}${r.gd}</td><td>${r.gf}</td>
    </tr>`;
  }).join('');

  return `<div class="group-card">
    <div class="group-hd"><h2>Group ${g.id}</h2><span>${done}/6 played</span></div>
    <div class="group-body">
      <div class="matches-col"><h3>Matches</h3>${matchRows}</div>
      <div class="standings-col">
        <h3>Standings</h3>
        <table class="std-table">
          <thead><tr><th>Team</th><th title="Played">P</th><th title="Points">Pts</th>
            <th>W</th><th>D</th><th>L</th><th title="Goal Difference">GD</th><th title="Goals For">GF</th></tr></thead>
          <tbody>${stdRows}</tbody>
        </table>
        <div class="std-legend">
          <span><span class="dot" style="background:var(--win)"></span>Qualify (1st/2nd)</span>
          <span><span class="dot" style="background:var(--draw)"></span>Possible 3rd</span>
        </div>
      </div>
    </div>
  </div>`;
}

  document.getElementById('groups-grid').innerHTML = GROUPS_DEF.map(renderGroupCard).join('');

// ── RENDER: BRACKET ─────────────────────────────────────────

function renderBracket() {
  const rounds = [
    {key:'R32',label:'Round of 32'},{key:'R16',label:'Round of 16'},
    {key:'QF',label:'Quarter-finals'},{key:'SF',label:'Semi-finals'},
    {key:'TP',label:'3rd Place'},{key:'F',label:'Final'},
  ];
  document.getElementById('bracket').innerHTML = rounds.map(rnd=>{
    const ms = Object.values(matches).filter(m=>m.round===rnd.key).sort((a,b)=>a.matchNum-b.matchNum);
    const cards = ms.map(m=>{
      const has = m.score1!==null&&m.score2!==null;
      const s1=has?m.score1:'–', s2=has?m.score2:'–';
      let w1='',w2='';
      if(has){
        const n1=+m.score1,n2=+m.score2;
        if(n1>n2) w1='winner'; else if(n2>n1) w2='winner';
        else if(m.pen1!==null){ if(+m.pen1>+m.pen2) w1='winner'; else w2='winner'; }
      }
      const pen=(m.pen1!==null&&m.pen2!==null)?` (${m.pen1}–${m.pen2}p)`:'';
      const gmt=toGMT(m.time,m.venue), cdt=toCDT(m.time,m.venue);
      const tzLine=(gmt!=='–')?`<span class="tz" style="display:block">${gmt} GMT · ${cdt} CDT</span>`:'';
      return `<div class="b-match" onclick="openModal('${m.id}')">
        <div class="b-team ${w1}"><div class="b-name">${flag(m.team1)}<span class="tn">${esc(m.team1)}</span></div><span class="b-score">${s1}</span></div>
        <div class="b-team ${w2}"><div class="b-name">${flag(m.team2)}<span class="tn">${esc(m.team2)}</span></div><span class="b-score">${s2}</span></div>
        <div class="b-meta">${fmtDate(m.date)}${pen}${tzLine}</div>
      </div>`;
    }).join('');
    return `<div class="rnd-col"><div class="rnd-title">${rnd.label}</div>${cards}</div>`;
  }).join('');
}

// ── RENDER: SCHEDULE ────────────────────────────────────────

function renderSchedule() {
  let ms = Object.values(matches).sort((a,b)=>{
    const da=new Date((a.date||'2099-01-01')+'T'+(a.time||'00:00'));
    const db=new Date((b.date||'2099-01-01')+'T'+(b.time||'00:00'));
    return da-db;
  });
  if(schedFilter==='group')     ms=ms.filter(m=>m.type==='group');
  else if(schedFilter==='knockout') ms=ms.filter(m=>m.type==='knockout');
  else if(schedFilter==='upcoming') ms=ms.filter(m=>m.status!=='completed');
  else if(schedFilter==='completed') ms=ms.filter(m=>m.status==='completed');

  const byDate={};
  ms.forEach(m=>{ const d=m.date||'TBD'; (byDate[d]||(byDate[d]=[])).push(m); });

  const html = Object.entries(byDate).map(([d,day])=>{
    const rows = day.map(m=>{
      const has=m.score1!==null&&m.score2!==null;
      const sc=has?`${m.score1} – ${m.score2}`:'vs';
      const pen=(m.pen1!==null&&m.pen2!==null)?` (${m.pen1}–${m.pen2}p)`:'';
      const stage=m.type==='group'?`Group ${m.group} · MD${m.matchday}`:(m.roundName||'');
      const gmt=toGMT(m.time,m.venue), cdt=toCDT(m.time,m.venue);
      return `<div class="sched-row" onclick="openModal('${m.id}')">
        <div class="sched-time">${gmt} GMT<span class="tz">${cdt} CDT</span></div>
        ${flag(m.team1)}
        <div class="sched-t right">${esc(m.team1)}</div>
        <div class="sched-score">${sc}${pen}</div>
        <div class="sched-t">${esc(m.team2)}</div>
        ${flag(m.team2)}
        <div class="stage-pill">${stage}</div>
      </div>`;
    }).join('');
    return `<div class="sched-day"><h3>${fmtDateLong(d==='TBD'?null:d)}</h3>${rows}</div>`;
  }).join('');

  document.getElementById('sched-list').innerHTML = html||'<p style="color:var(--muted);text-align:center;padding:40px">No matches</p>';
}

const DATA_VERSION = '2026v2';

function load() {
  try {
    const s = localStorage.getItem('wc2026');
    const v = localStorage.getItem('wc2026_ver');
    if (s && v === DATA_VERSION) matches = JSON.parse(s);
    else matches = buildDefaultMatches();
  } catch(_) { matches = buildDefaultMatches(); }
  if (!matches || !Object.keys(matches).length) matches = buildDefaultMatches();
}

function save() {
  localStorage.setItem('wc2026', JSON.stringify(matches));
  localStorage.setItem('wc2026_ver', DATA_VERSION);
}

let editId = null;

function openModal(id) {
  const m = matches[id];
  if(!m) return;
  editId = id;
  document.getElementById('m-title').textContent =
    m.type==='group' ? `Group ${m.group} · Matchday ${m.matchday}` : (m.roundName||m.round);
  document.getElementById('m-t1').textContent = m.team1;
  document.getElementById('m-t2').textContent = m.team2;
  document.getElementById('m-s1').value = m.score1!==null ? m.score1 : '';
  document.getElementById('m-s2').value = m.score2!==null ? m.score2 : '';
  document.getElementById('m-p1').value = m.pen1!==null ? m.pen1 : '';
  document.getElementById('m-p2').value = m.pen2!==null ? m.pen2 : '';
  document.getElementById('m-date').value  = m.date||'';
  document.getElementById('m-time').value  = m.time||'';
  document.getElementById('m-venue').value = m.venue||'';
  document.getElementById('m-status').value = m.status||'scheduled';
  document.getElementById('pen-row').classList.toggle('show', m.type==='knockout');
  document.getElementById('overlay').classList.remove('hidden');
  document.getElementById('m-s1').focus();
}

function closeModal() {
  document.getElementById('overlay').classList.add('hidden');
  editId = null;
}

function saveResult() {
  if(!editId) return;
  const m = matches[editId];
  const s1v = document.getElementById('m-s1').value;
  const s2v = document.getElementById('m-s2').value;
  m.score1 = s1v!==''?+s1v:null;
  m.score2 = s2v!==''?+s2v:null;
  const p1v = document.getElementById('m-p1').value;
  const p2v = document.getElementById('m-p2').value;
  m.pen1 = p1v!==''?+p1v:null;
  m.pen2 = p2v!==''?+p2v:null;
  m.date   = document.getElementById('m-date').value;
  m.time   = document.getElementById('m-time').value;
  m.venue  = document.getElementById('m-venue').value;
  m.status = document.getElementById('m-status').value;
  if(m.score1!==null && m.score2!==null && m.status==='scheduled') m.status='completed';
  save();
  closeModal();
  renderAll();
}

function clearResult() {
  if(!editId) return;
  const m = matches[editId];
  m.score1=m.score2=m.pen1=m.pen2=null;
  m.status='scheduled';
  save();
  closeModal();
  renderAll();
}

function resetAll() {
  if(!confirm('Reset ALL match data? This cannot be undone.')) return;
  matches = buildDefaultMatches();
  save();
  renderAll();
}

document.getElementById('overlay').addEventListener('click', e => { if(e.target.id==='overlay') closeModal(); });
